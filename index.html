<!DOCTYPE html>
<html>
<head>
  <title>STARC Organisation</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header img {
      display: block;
      margin: auto;
    }

    nav {
      background: #34495e;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: yellow;
    }

    section {
      padding: 40px;
      text-align: center;
    }

    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 10px;
    }

    input, textarea {
      width: 250px;
      padding: 8px;
    }

    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: red;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" width="120">
  <h1>Social Transformation and Research Centre</h1>
  <p>Empowering Communities</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Services</a>
  <a href="#">Contact</a>
</nav>

<section>
  <h2>Welcome</h2>
  <p>Our organisation works for social development and empowerment.</p>
</section>

<section>
  <h2>About Us</h2>
  <p>We are dedicated to improving lives through various initiatives.</p>
</section>

<section>
  <h2>Contact Us</h2>

  <form>
    <input type="text" placeholder="Your Name" required><br><br>
    <input type="email" placeholder="Your Email" required><br><br>
    <textarea placeholder="Your Message" required></textarea><br><br>

    <button onclick="sendMsg()">Send</button>
  </form>

</section>

<footer>
  <p>© 2026 STARC</p>
</footer>

<script>
function sendMsg() {
  alert("Message sent successfully ??");
}
</script>

</body>
</html>
